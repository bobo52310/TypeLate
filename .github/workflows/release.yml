name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            stable_suffix: mac-arm64.dmg
            dmg_glob: "*.dmg"
            upload_sourcemaps: "true"
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            stable_suffix: mac-x64.dmg
            dmg_glob: "*.dmg"
            upload_sourcemaps: "false"
          - platform: windows-latest
            args: ""
            rust_target: ""
            stable_suffix: windows-x64.exe
            dmg_glob: ""
            upload_sourcemaps: "false"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi

          RAW_TAG="${RAW_TAG#refs/tags/}"
          RELEASE_VERSION="${RAW_TAG#v}"

          echo "RELEASE_TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "SENTRY_RELEASE=typelate@$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "VITE_SENTRY_RELEASE=typelate@$RELEASE_VERSION" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Sync version from tag
        shell: bash
        run: |
          VER="${RELEASE_VERSION}"
          echo "Syncing version to $VER"

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VER}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Update tauri.conf.json
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '${VER}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

          # Update Cargo.toml
          sed -i.bak 's/^version = ".*"/version = "'"${VER}"'"/' src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          VITE_SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: ${{ env.SENTRY_RELEASE }}
          VITE_SENTRY_RELEASE: ${{ env.VITE_SENTRY_RELEASE }}
          VITE_SENTRY_SOURCEMAPS_ENABLED: ${{ matrix.upload_sourcemaps }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "TypeLate v${{ env.RELEASE_VERSION }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload frontend sourcemaps to Sentry
        if: matrix.upload_sourcemaps == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        shell: bash
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN}" ] || [ -z "${SENTRY_ORG}" ] || [ -z "${SENTRY_PROJECT}" ]; then
            echo "Sentry sourcemap upload skipped: missing Sentry release secrets."
            exit 0
          fi

          npx @sentry/cli releases new "$SENTRY_RELEASE" || true
          npx @sentry/cli sourcemaps upload dist/assets \
            --release "$SENTRY_RELEASE" \
            --url-prefix "~/assets" \
            --validate \
            --wait
          npx @sentry/cli releases finalize "$SENTRY_RELEASE" || true

      - name: Upload stable-name asset (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find src-tauri/target -path "*/bundle/dmg/*.dmg" | head -1)

          # Versioned name (e.g. TypeLate-v1.2.0-mac-arm64.dmg)
          VERSIONED_NAME="TypeLate-v${RELEASE_VERSION}-${{ matrix.stable_suffix }}"
          cp "$DMG" "$VERSIONED_NAME"
          gh release upload "$RELEASE_TAG" "$VERSIONED_NAME" --clobber

          # Stable alias without version (e.g. TypeLate-mac-arm64.dmg) — used by website
          STABLE_NAME="TypeLate-${{ matrix.stable_suffix }}"
          cp "$DMG" "$STABLE_NAME"
          gh release upload "$RELEASE_TAG" "$STABLE_NAME" --clobber

      - name: Upload stable-name asset (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri\target" -Recurse -Filter "*-setup.exe" | Select-Object -First 1

          # Versioned name (e.g. TypeLate-v1.2.0-windows-x64.exe)
          $versionedName = "TypeLate-v$env:RELEASE_VERSION-${{ matrix.stable_suffix }}"
          Copy-Item $exe.FullName $versionedName
          gh release upload "$env:RELEASE_TAG" $versionedName --clobber

          # Stable alias without version (e.g. TypeLate-windows-x64.exe) — used by website
          $stableName = "TypeLate-${{ matrix.stable_suffix }}"
          Copy-Item $exe.FullName $stableName
          gh release upload "$env:RELEASE_TAG" $stableName --clobber

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi

          RAW_TAG="${RAW_TAG#refs/tags/}"
          RELEASE_VERSION="${RAW_TAG#v}"
          echo "RELEASE_TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Clean up duplicate assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${GITHUB_REPOSITORY}"
          TAG="${RELEASE_TAG}"
          VER="${RELEASE_VERSION}"

          # Delete Tauri-named DMGs (replaced by custom-named ones)
          gh release delete-asset "$TAG" --repo "$REPO" "TypeLate_${VER}_aarch64.dmg" --yes 2>/dev/null || true
          gh release delete-asset "$TAG" --repo "$REPO" "TypeLate_${VER}_x64.dmg" --yes 2>/dev/null || true

          # Delete Tauri-named NSIS exe (replaced by custom-named one)
          gh release delete-asset "$TAG" --repo "$REPO" "TypeLate_${VER}_x64-setup.exe" --yes 2>/dev/null || true

          # Delete MSI artifacts (in case they were built)
          gh release delete-asset "$TAG" --repo "$REPO" "TypeLate_${VER}_x64_en-US.msi" --yes 2>/dev/null || true
          gh release delete-asset "$TAG" --repo "$REPO" "TypeLate_${VER}_x64_en-US.msi.sig" --yes 2>/dev/null || true

      - name: Consolidate latest.json from all platform signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${GITHUB_REPOSITORY}"
          TAG="${RELEASE_TAG}"
          VER="${RELEASE_VERSION}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Download signature files (uploaded by tauri-action per platform)
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" -p "*.sig" -D /tmp/sigs --clobber 2>/dev/null || true
          gh release download "$TAG" --repo "$REPO" -p "latest.json" -D /tmp --clobber 2>/dev/null || true

          # Read signatures (base64-encoded content of .sig files)
          MAC_ARM64_SIG=""
          MAC_X64_SIG=""
          WIN_X64_SIG=""

          if [ -f "/tmp/sigs/TypeLate_aarch64.app.tar.gz.sig" ]; then
            MAC_ARM64_SIG=$(cat "/tmp/sigs/TypeLate_aarch64.app.tar.gz.sig")
          fi
          if [ -f "/tmp/sigs/TypeLate_x64.app.tar.gz.sig" ]; then
            MAC_X64_SIG=$(cat "/tmp/sigs/TypeLate_x64.app.tar.gz.sig")
          fi
          if [ -f "/tmp/sigs/TypeLate_${VER}_x64-setup.exe.sig" ]; then
            WIN_X64_SIG=$(cat "/tmp/sigs/TypeLate_${VER}_x64-setup.exe.sig")
          elif [ -f "/tmp/latest.json" ]; then
            # Fallback: extract Windows sig from existing latest.json
            WIN_X64_SIG=$(python3 -c "
          import json, sys
          with open('/tmp/latest.json') as f:
              data = json.load(f)
          for key in ['windows-x86_64', 'windows-x86_64-nsis']:
              if key in data.get('platforms', {}):
                  print(data['platforms'][key].get('signature', ''))
                  sys.exit(0)
          " 2>/dev/null || true)
          fi

          # Build consolidated latest.json with all available platforms
          python3 -c "
          import json, datetime

          platforms = {}

          mac_arm64_sig = '''${MAC_ARM64_SIG}'''
          mac_x64_sig = '''${MAC_X64_SIG}'''
          win_x64_sig = '''${WIN_X64_SIG}'''
          base_url = '${BASE_URL}'
          ver = '${VER}'

          if mac_arm64_sig.strip():
              platforms['darwin-aarch64'] = {
                  'signature': mac_arm64_sig.strip(),
                  'url': f'{base_url}/TypeLate_aarch64.app.tar.gz'
              }

          if mac_x64_sig.strip():
              platforms['darwin-x86_64'] = {
                  'signature': mac_x64_sig.strip(),
                  'url': f'{base_url}/TypeLate_x64.app.tar.gz'
              }

          if win_x64_sig.strip():
              platforms['windows-x86_64'] = {
                  'signature': win_x64_sig.strip(),
                  'url': f'{base_url}/TypeLate-v{ver}-windows-x64.exe'
              }

          result = {
              'version': ver,
              'notes': 'See the assets to download and install this version.',
              'pub_date': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S.000Z'),
              'platforms': platforms
          }

          with open('/tmp/latest.json', 'w') as f:
              json.dump(result, f, indent=2)

          print(f'Consolidated latest.json with platforms: {list(platforms.keys())}')
          "

          # Upload consolidated latest.json
          gh release delete-asset "$TAG" --repo "$REPO" "latest.json" --yes 2>/dev/null || true
          gh release upload "$TAG" --repo "$REPO" /tmp/latest.json

          # Clean up .sig files from release (signatures are now in latest.json)
          gh release delete-asset "$TAG" --repo "$REPO" "TypeLate_${VER}_x64-setup.exe.sig" --yes 2>/dev/null || true
          gh release delete-asset "$TAG" --repo "$REPO" "TypeLate_aarch64.app.tar.gz.sig" --yes 2>/dev/null || true
          gh release delete-asset "$TAG" --repo "$REPO" "TypeLate_x64.app.tar.gz.sig" --yes 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git log between tags

      - name: Generate release notes from commits
        id: notes
        run: |
          TAG="${RELEASE_TAG}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          echo "Generating notes for $RANGE"

          {
            echo 'RELEASE_NOTES<<NOTES_EOF'

            # Features
            FEATS=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep -iE "^feat" | sed 's/^feat[^:]*: *//' || true)
            if [ -n "$FEATS" ]; then
              echo "### ✨ New Features"
              echo "$FEATS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # Bug Fixes
            FIXES=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep -iE "^fix" | sed 's/^fix[^:]*: *//' || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            # Other changes (refactor, perf, docs, chore)
            OTHERS=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep -ivE "^(feat|fix)" | head -20 || true)
            if [ -n "$OTHERS" ]; then
              echo "### 🔧 Other Changes"
              echo "$OTHERS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi

            echo "---"
            echo "**Full Changelog**: https://github.com/$GITHUB_REPOSITORY/compare/${PREV_TAG}...${TAG}"

            echo 'NOTES_EOF'
          } >> "$GITHUB_ENV"

      - name: Inject release notes into latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${RELEASE_TAG}"
          REPO="${GITHUB_REPOSITORY}"

          gh release download "$TAG" --repo "$REPO" -p "latest.json" -D /tmp --clobber

          python3 -c "
          import json, os

          notes = os.environ.get('RELEASE_NOTES', 'See the assets to download and install this version.')

          with open('/tmp/latest.json') as f:
              data = json.load(f)

          data['notes'] = notes

          with open('/tmp/latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

          gh release delete-asset "$TAG" --repo "$REPO" "latest.json" --yes 2>/dev/null || true
          gh release upload "$TAG" --repo "$REPO" /tmp/latest.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --notes "$RELEASE_NOTES"
