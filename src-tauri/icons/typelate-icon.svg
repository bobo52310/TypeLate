<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <!-- Gold gradient for mic body -->
    <linearGradient id="micGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Lighter gold for arc/stand -->
    <linearGradient id="micArc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="cursor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <!-- Subtle glow behind mic -->
    <filter id="micGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#FBBF24" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>

  <!-- Subtle glow behind mic -->
  <ellipse cx="512" cy="380" rx="180" ry="250" fill="#FBBF24" opacity="0.06"/>

  <!-- Microphone body — gold -->
  <rect x="412" y="100" width="200" height="340" rx="100" ry="100" fill="url(#micGold)"/>

  <!-- Sleepy droopy eyes — dark on gold -->
  <line x1="462" y1="230" x2="500" y2="224" stroke="#92400E" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="524" y1="224" x2="562" y2="230" stroke="#92400E" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

  <!-- Sleepy open mouth -->
  <ellipse cx="512" cy="268" rx="12" ry="8" fill="#92400E" opacity="0.2"/>

  <!-- Mic arc — gold -->
  <path d="M 330 350 Q 330 540, 512 540 Q 694 540, 694 350"
        fill="none" stroke="url(#micArc)" stroke-width="40" stroke-linecap="round" opacity="0.85"/>

  <!-- Mic stand — gold (visible vertical line) -->
  <line x1="512" y1="540" x2="512" y2="630" stroke="#FBBF24" stroke-width="40" stroke-linecap="round" opacity="0.9"/>

  <!-- LEFT: Sound waveform bars — same gold -->
  <rect x="115" y="260" width="30" height="110" rx="15" fill="url(#wave)" opacity="0.6"/>
  <rect x="166" y="190" width="30" height="250" rx="15" fill="url(#wave)" opacity="0.85"/>
  <rect x="217" y="225" width="30" height="180" rx="15" fill="url(#wave)" opacity="0.7"/>
  <rect x="268" y="270" width="30" height="90" rx="15" fill="url(#wave)" opacity="0.5"/>

  <!-- RIGHT: Text lines — same gold -->
  <rect x="738" y="225" width="155" height="24" rx="12" fill="url(#wave)" opacity="0.85"/>
  <rect x="738" y="271" width="195" height="24" rx="12" fill="url(#wave)" opacity="0.7"/>
  <rect x="738" y="317" width="125" height="24" rx="12" fill="url(#wave)" opacity="0.6"/>
  <rect x="738" y="363" width="168" height="24" rx="12" fill="url(#wave)" opacity="0.5"/>

  <!-- Big Zzz -->
  <text x="660" y="155" font-family="-apple-system, sans-serif" font-weight="800" font-size="85" fill="#FDE68A" opacity="0.7">Z</text>
  <text x="730" y="100" font-family="-apple-system, sans-serif" font-weight="800" font-size="62" fill="#FDE68A" opacity="0.5">z</text>
  <text x="778" y="55" font-family="-apple-system, sans-serif" font-weight="800" font-size="44" fill="#FDE68A" opacity="0.3">z</text>

  <!-- Cursor -->
  <rect x="498" y="655" width="28" height="55" rx="6" fill="url(#cursor)"/>

  <!-- TypeLate text -->
  <g filter="url(#textShadow)">
    <text x="370" y="870" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-weight="500" font-size="128" fill="white" letter-spacing="2" opacity="0.4">Type</text>
    <text x="660" y="870" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-weight="800" font-size="128" fill="#FDE68A" letter-spacing="2" opacity="0.95">Late</text>
  </g>
</svg>
