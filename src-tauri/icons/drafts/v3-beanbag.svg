<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="mic3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="bean3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>

  <!-- Warm orange background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg3)"/>

  <!-- Bean bag -->
  <ellipse cx="480" cy="560" rx="220" ry="130" fill="url(#bean3)" opacity="0.5"/>
  <ellipse cx="480" cy="540" rx="200" ry="110" fill="url(#bean3)" opacity="0.4"/>

  <!-- Mic person sunk into bean bag -->
  <g transform="translate(480, 420) rotate(-15)">
    <!-- Body -->
    <rect x="-58" y="-125" width="116" height="200" rx="58" fill="url(#mic3)"/>

    <!-- Grille lines -->
    <line x1="-28" y1="-72" x2="28" y2="-72" stroke="#F97316" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
    <line x1="-28" y1="-46" x2="28" y2="-46" stroke="#F97316" stroke-width="5" stroke-linecap="round" opacity="0.2"/>
    <line x1="-28" y1="-20" x2="28" y2="-20" stroke="#F97316" stroke-width="5" stroke-linecap="round" opacity="0.2"/>

    <!-- Half-open sleepy eyes (one open, one closing - winking/drowsy) -->
    <!-- Left eye: half closed -->
    <ellipse cx="-20" cy="-100" rx="10" ry="5" fill="#F97316" opacity="0.7"/>
    <path d="M -30 -100 Q -20 -108, -10 -100" fill="none" stroke="#F97316" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Right eye: closed -->
    <path d="M 10 -100 Q 20 -110, 30 -100" fill="none" stroke="#F97316" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Yawning mouth -->
    <ellipse cx="0" cy="-78" rx="12" ry="14" fill="#F97316" opacity="0.3"/>

    <!-- Blush -->
    <circle cx="-32" cy="-88" r="8" fill="#FCD34D" opacity="0.4"/>
    <circle cx="32" cy="-88" r="8" fill="#FCD34D" opacity="0.4"/>

    <!-- One arm up waving lazily, one resting -->
    <path d="M -58 -40 Q -100 -80, -80 -130" fill="none" stroke="#E2E8F0" stroke-width="16" stroke-linecap="round"/>
    <!-- Small hand wave lines -->
    <line x1="-90" y1="-145" x2="-75" y2="-155" stroke="#FCD34D" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="-80" y1="-140" x2="-65" y2="-155" stroke="#FCD34D" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

    <line x1="58" y1="10" x2="100" y2="50" stroke="#E2E8F0" stroke-width="16" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="-20" y1="75" x2="-55" y2="155" stroke="#E2E8F0" stroke-width="18" stroke-linecap="round"/>
    <line x1="20" y1="75" x2="70" y2="145" stroke="#E2E8F0" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- Speech bubble: "just say it~" -->
  <g transform="translate(710, 280)">
    <rect x="-75" y="-28" width="150" height="52" rx="24" fill="white" opacity="0.25"/>
    <polygon points="-40,24 -25,24 -55,50" fill="white" opacity="0.25"/>
    <text x="0" y="5" text-anchor="middle" font-family="-apple-system, sans-serif" font-weight="600" font-size="26" fill="white" opacity="0.85">say it ~</text>
  </g>

  <!-- TypeLate text -->
  <text x="512" y="830" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Rounded', sans-serif"
        font-weight="800" font-size="92" fill="white" letter-spacing="2" opacity="0.95">
    TypeLate
  </text>
</svg>
