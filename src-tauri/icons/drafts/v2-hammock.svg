<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="mic2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg2)"/>

  <!-- Subtle glow behind character -->
  <ellipse cx="512" cy="450" rx="280" ry="200" fill="#6366F1" opacity="0.08"/>

  <!-- Hammock ropes -->
  <line x1="180" y1="280" x2="340" y2="500" stroke="#A78BFA" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <line x1="844" y1="280" x2="684" y2="500" stroke="#A78BFA" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

  <!-- Hammock curve -->
  <path d="M 300 470 Q 512 620, 724 470" fill="none" stroke="#A78BFA" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <!-- Hammock fabric -->
  <path d="M 300 470 Q 512 640, 724 470 Q 512 600, 300 470 Z" fill="#A78BFA" opacity="0.15"/>

  <!-- Mic person lying in hammock -->
  <g transform="translate(512, 500) rotate(-8)">
    <!-- Body -->
    <rect x="-50" y="-110" width="100" height="170" rx="50" fill="url(#mic2)"/>

    <!-- Grille lines -->
    <line x1="-22" y1="-65" x2="22" y2="-65" stroke="#6366F1" stroke-width="4.5" stroke-linecap="round" opacity="0.2"/>
    <line x1="-22" y1="-42" x2="22" y2="-42" stroke="#6366F1" stroke-width="4.5" stroke-linecap="round" opacity="0.2"/>
    <line x1="-22" y1="-19" x2="22" y2="-19" stroke="#6366F1" stroke-width="4.5" stroke-linecap="round" opacity="0.2"/>

    <!-- Closed happy eyes -->
    <path d="M -22 -88 Q -13 -98, -4 -88" fill="none" stroke="#6366F1" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M 4 -88 Q 13 -98, 22 -88" fill="none" stroke="#6366F1" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Content smile -->
    <path d="M -8 -72 Q 0 -64, 8 -72" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round"/>

    <!-- Blush -->
    <circle cx="-26" cy="-78" r="7" fill="#F9A8D4" opacity="0.4"/>
    <circle cx="26" cy="-78" r="7" fill="#F9A8D4" opacity="0.4"/>

    <!-- Arms behind head (relaxing pose) -->
    <path d="M -50 -50 Q -90 -90, -60 -120" fill="none" stroke="#CBD5E1" stroke-width="15" stroke-linecap="round"/>
    <path d="M 50 -50 Q 90 -90, 60 -120" fill="none" stroke="#CBD5E1" stroke-width="15" stroke-linecap="round"/>

    <!-- Legs dangling -->
    <line x1="-15" y1="60" x2="-40" y2="130" stroke="#CBD5E1" stroke-width="16" stroke-linecap="round"/>
    <line x1="15" y1="60" x2="50" y2="125" stroke="#CBD5E1" stroke-width="16" stroke-linecap="round"/>
  </g>

  <!-- Speech bubble with "..." (too lazy to type) -->
  <g transform="translate(700, 310)">
    <rect x="-55" y="-30" width="110" height="55" rx="25" fill="white" opacity="0.15"/>
    <polygon points="-20,25 -10,25 -30,45" fill="white" opacity="0.15"/>
    <circle cx="-18" cy="0" r="6" fill="white" opacity="0.5"/>
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.5"/>
    <circle cx="18" cy="0" r="6" fill="white" opacity="0.5"/>
  </g>

  <!-- Zzz -->
  <text x="220" y="340" font-family="-apple-system, sans-serif" font-weight="800" font-size="50" fill="#818CF8" opacity="0.5" transform="rotate(-10, 220, 340)">z</text>
  <text x="190" y="290" font-family="-apple-system, sans-serif" font-weight="800" font-size="40" fill="#818CF8" opacity="0.35" transform="rotate(-10, 190, 290)">z</text>
  <text x="170" y="250" font-family="-apple-system, sans-serif" font-weight="800" font-size="30" fill="#818CF8" opacity="0.2" transform="rotate(-10, 170, 250)">z</text>

  <!-- TypeLate text -->
  <text x="512" y="820" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Rounded', sans-serif"
        font-weight="600" font-size="85" fill="white" letter-spacing="3" opacity="0.9">
    TypeLate
  </text>
</svg>
